name: Daily ad analysis

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python run_collector.py --no-creative
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_CAMPAIGN_ID: ${{ secrets.META_CAMPAIGN_ID }}
          META_ADSET_ID: ${{ secrets.META_ADSET_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}

      - name: Run AI analyzer
        run: python analyzer/analyzer.py --days 7
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: campaign-report
          path: |
            data_collector/metrics.db
            analyzer/report.json
          retention-days: 7
